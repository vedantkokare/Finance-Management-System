<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FinTrack</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fade-in">
    <div class="auth-wrapper">
        <div class="card auth-card fade-in">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary mb-2"><i class="fa-solid fa-wallet"></i> FinTrack</h2>
                    <p class="text-muted">Welcome back! Please login to your account.</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger rounded-3 py-2 px-3 fs-7 fw-medium shadow-sm">
                    Invalid username or password.
                </div>
                <div th:if="${param.logout}" class="alert alert-success rounded-3 py-2 px-3 fs-7 fw-medium shadow-sm">
                    You have been logged out successfully.
                </div>
                <div th:if="${resetSuccess}" class="alert alert-success rounded-3 py-2 px-3 fs-7 fw-medium shadow-sm" th:text="${resetSuccess}"></div>

                <!-- Google OAuth2 Login Button -->
                <a th:href="@{/oauth2/authorization/google}" class="btn btn-google mb-3 text-decoration-none shadow-sm">
                    <img src="https://www.vectorlogo.zone/logos/google/google-icon.svg" alt="Google Logo">
                    <span>Continue with Google</span>
                </a>

                <div class="divider">or sign in with email</div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold text-dark fs-7">Email address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="Enter your email" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between align-items-center mb-1">
                            <label for="password" class="form-label fw-semibold text-dark fs-7 mb-0">Password</label>
                            <a th:href="@{/forgot-password}" class="text-decoration-none text-primary fw-medium fs-7">Forgot Password?</a>
                        </div>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="Enter your password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-4 py-2 fs-6 shadow-sm">Login</button>
                    
                    <div class="text-center pt-2 border-top">
                        <p class="text-muted mb-0 fs-7">Don't have an account? <a th:href="@{/register}" class="text-decoration-none fw-bold text-primary">Register here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

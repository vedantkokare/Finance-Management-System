<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - FinTrack</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fade-in">
    <div class="auth-wrapper">
        <div class="card auth-card fade-in">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary mb-2"><i class="fa-solid fa-key"></i> Password Reset</h2>
                    <p class="text-muted fs-7">Enter your registered email address and we'll send you a password reset link.</p>
                </div>

                <div th:if="${success}" class="alert alert-success rounded-3 py-2 px-3 fs-7 fw-medium shadow-sm" th:text="${success}"></div>
                <div th:if="${error}" class="alert alert-danger rounded-3 py-2 px-3 fs-7 fw-medium shadow-sm" th:text="${error}"></div>

                <form th:action="@{/forgot-password}" method="post">
                    <div class="mb-4">
                        <label for="email" class="form-label fw-semibold text-dark fs-7">Email address</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa-regular fa-envelope"></i></span>
                            <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" placeholder="Enter your email" required autofocus>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-4 py-2 fs-6 shadow-sm">Send Reset Link</button>
                    
                    <div class="text-center pt-2 border-top">
                        <p class="text-muted mb-0 fs-7"><a th:href="@{/login}" class="text-decoration-none fw-bold text-primary"><i class="fa-solid fa-arrow-left me-1"></i> Back to Login</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

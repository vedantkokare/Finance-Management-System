<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FinTrack</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="fade-in">
    <div class="auth-wrapper">
        <div class="card auth-card fade-in">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary mb-2"><i class="fa-solid fa-wallet"></i> FinTrack</h2>
                    <p class="text-muted fs-7">Create your account and start managing your finances.</p>
                </div>

                <div th:if="${param.success}" class="alert alert-success rounded-3 py-2 px-3 fs-7 fw-medium shadow-sm">
                    Registration successful! You can now <a th:href="@{/login}" class="fw-bold">login</a>.
                </div>

                <!-- Google OAuth2 Signup Button -->
                <a th:href="@{/oauth2/authorization/google}" class="btn btn-google mb-3 text-decoration-none shadow-sm">
                    <img src="https://www.vectorlogo.zone/logos/google/google-icon.svg" alt="Google Logo">
                    <span>Sign up with Google</span>
                </a>

                <div class="divider">or register with email</div>

                <form th:action="@{/register}" th:object="${user}" method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="firstName" class="form-label fw-semibold text-dark fs-7">First Name</label>
                            <input type="text" class="form-control" th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid' : ''" id="firstName" th:field="*{firstName}" placeholder="First Name" required>
                            <div class="invalid-feedback fs-8" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="lastName" class="form-label fw-semibold text-dark fs-7">Last Name</label>
                            <input type="text" class="form-control" th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid' : ''" id="lastName" th:field="*{lastName}" placeholder="Last Name" required>
                            <div class="invalid-feedback fs-8" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold text-dark fs-7">Email address</label>
                        <input type="email" class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''" id="email" th:field="*{email}" placeholder="Enter your email" required>
                        <div class="invalid-feedback fs-8" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold text-dark fs-7">Password</label>
                        <input type="password" class="form-control mb-1" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''" id="password" th:field="*{password}" placeholder="Create a password" required>
                        <div class="invalid-feedback fs-8" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        <div class="form-text fs-8 text-muted">Password must be at least 6 characters long.</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-4 py-2 fs-6 shadow-sm">Create Account</button>
                    
                    <div class="text-center pt-2 border-top">
                        <p class="text-muted mb-0 fs-7">Already have an account? <a th:href="@{/login}" class="text-decoration-none fw-bold text-primary">Login here</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

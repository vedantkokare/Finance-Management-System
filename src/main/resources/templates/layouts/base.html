<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">Finance Management System</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
    
    <!-- Specific Page CSS slot -->
    <th:block layout:fragment="css"></th:block>
</head>
<body class="fade-in">

    <!-- Sidebar Overlay for mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <a th:href="@{/dashboard}" class="brand">
            <i class="fa-solid fa-wallet"></i> <span>FinTrack</span>
        </a>
        <ul class="sidebar-nav mt-3">
            <li class="sidebar-nav-item">
                <a th:href="@{/dashboard}" class="sidebar-nav-link active">
                    <i class="fa-solid fa-chart-pie"></i> <span>Dashboard</span>
                </a>
            </li>
            <li class="sidebar-nav-item">
                <a th:href="@{/transactions}" class="sidebar-nav-link">
                    <i class="fa-solid fa-money-bill-transfer"></i> <span>Transactions</span>
                </a>
            </li>
            <li class="sidebar-nav-item">
                <a th:href="@{/accounts}" class="sidebar-nav-link">
                    <i class="fa-solid fa-building-columns"></i> <span>Accounts</span>
                </a>
            </li>
            <li class="sidebar-nav-item">
                <a th:href="@{/loans}" class="sidebar-nav-link">
                    <i class="fa-solid fa-hand-holding-dollar"></i> <span>Loans</span>
                </a>
            </li>
            <li class="sidebar-nav-item">
                <a th:href="@{/reports}" class="sidebar-nav-link">
                    <i class="fa-solid fa-chart-line"></i> <span>Reports</span>
                </a>
            </li>
            <li class="sidebar-nav-item mt-4 pt-3 border-top border-light">
                <form th:action="@{/logout}" method="post" class="d-inline w-100">
                    <button type="submit" class="sidebar-nav-link border-0 bg-transparent text-danger w-100 text-start fw-semibold">
                        <i class="fa-solid fa-right-from-bracket"></i> <span>Logout</span>
                    </button>
                </form>
            </li>
        </ul>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Navbar -->
        <header class="top-navbar shadow-sm">
            <div class="d-flex align-items-center">
                <button class="btn btn-link text-dark d-md-none p-0 me-3" id="sidebarToggle" aria-label="Toggle Navigation">
                    <i class="fa-solid fa-bars fs-4"></i>
                </button>
                <h4 class="mb-0 fw-bold text-dark" layout:fragment="page-header">Dashboard</h4>
            </div>
            
            <div class="user-profile d-flex align-items-center gap-3">
                <div class="notifications">
                    <button class="btn btn-light rounded-circle position-relative p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                        <i class="fa-regular fa-bell fs-5 text-muted"></i>
                        <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-white rounded-circle">
                            <span class="visually-hidden">New alerts</span>
                        </span>
                    </button>
                </div>
                <div class="dropdown">
                    <button class="btn btn-light dropdown-toggle d-flex align-items-center gap-2 rounded-pill py-1 px-2 border" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <div th:if="${#authentication.principal.profilePictureUrl != null}">
                            <img th:src="${#authentication.principal.profilePictureUrl}" class="rounded-circle" style="width: 32px; height: 32px; object-fit: cover; border: 2px solid var(--primary-color);" alt="Avatar">
                        </div>
                        <div th:unless="${#authentication.principal.profilePictureUrl != null}" class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center fw-bold fs-6 shadow-sm" style="width: 32px; height: 32px;">
                            <span th:text="${#strings.substring(#authentication.principal.fullName, 0, 1)}">U</span>
                        </div>
                        <span class="d-none d-md-inline fw-semibold text-dark pe-1" sec:authentication="principal.fullName">User</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end shadow-lg border-0 rounded-4 mt-2 p-2">
                        <li><a class="dropdown-item rounded-3 py-2 px-3 fw-medium" href="#"><i class="fa-regular fa-user me-2 text-primary"></i> Profile</a></li>
                        <li><a class="dropdown-item rounded-3 py-2 px-3 fw-medium" href="#"><i class="fa-solid fa-gear me-2 text-primary"></i> Settings</a></li>
                        <li><hr class="dropdown-divider my-1"></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item rounded-3 py-2 px-3 text-danger fw-semibold">
                                    <i class="fa-solid fa-right-from-bracket me-2"></i> Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </header>

        <!-- Dynamic Content -->
        <div layout:fragment="content" class="fade-in">
            <!-- Page specific content will go here -->
        </div>

    </main>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script th:src="@{/js/main.js}"></script>
    
    <!-- Specific Page JS slot -->
    <th:block layout:fragment="script"></th:block>
</body>
</html>

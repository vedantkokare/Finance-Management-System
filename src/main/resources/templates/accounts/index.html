<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base}">
<head>
    <title>Manage Accounts - FinTrack</title>
</head>
<body>

    <h4 layout:fragment="page-header" class="mb-0 fw-bold text-dark">My Financial Accounts</h4>

    <div layout:fragment="content" class="fade-in">
        
        <!-- Top Metrics & Action Row -->
        <div class="row align-items-center mb-4">
            <div class="col-md-6 mb-3 mb-md-0">
                <div class="card border-0 shadow-sm bg-primary text-white p-3 rounded-4">
                    <div class="card-body py-2">
                        <h6 class="text-white text-opacity-75 text-uppercase fs-8 tracking-wider mb-2">Net Financial Worth</h6>
                        <h2 class="fw-bolder mb-0 fs-1" th:text="'₹' + ${#numbers.formatDecimal(totalBalance, 1, 'COMMA', 2, 'POINT')}">₹0.00</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-6 text-md-end">
                <button type="button" class="btn btn-primary btn-lg rounded-pill px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#addAccountModal">
                    <i class="fa-solid fa-plus me-2"></i> Add Bank Account
                </button>
            </div>
        </div>

        <!-- Alert messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show rounded-3 shadow-sm mb-4" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${success}">Success message</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <!-- Accounts Grid -->
        <div class="row">
            <div th:each="account : ${accounts}" class="col-xl-4 col-md-6 mb-4">
                <div class="card h-100 border-0 shadow-sm rounded-4 overflow-hidden position-relative hover-scale">
                    <!-- Top subtle indicator band -->
                    <div class="position-absolute top-0 start-0 w-100" style="height: 6px;"
                         th:styleappend="${account.accountType.name() == 'CASH' ? 'background: linear-gradient(90deg, #f59e0b, #d97706);' : 'background: linear-gradient(90deg, #4f46e5, #06b6d4);'}"></div>
                    
                    <div class="card-body p-4 pt-5">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <div>
                                <span class="badge rounded-pill px-3 py-1.5 fs-8 mb-2 fw-semibold"
                                      th:classappend="${account.accountType.name() == 'CASH' ? 'bg-warning bg-opacity-10 text-warning' : 'bg-indigo bg-opacity-10 text-indigo'}"
                                      th:text="${account.accountType}">CASH</span>
                                <h4 class="fw-bold text-dark mb-1" th:text="${account.name}">Cash Wallet</h4>
                                <small th:if="${account.accountNumber != null && !account.accountNumber.isEmpty()}" 
                                       class="text-muted font-monospace fs-7" 
                                       th:text="'A/C: ' + ${account.accountNumber}">A/C: 123456789</small>
                            </div>
                            <div class="rounded-circle p-3 d-flex align-items-center justify-content-center"
                                 th:classappend="${account.accountType.name() == 'CASH' ? 'bg-warning bg-opacity-10 text-warning' : 'bg-primary bg-opacity-10 text-primary'}"
                                 style="width: 52px; height: 52px;">
                                <i th:classappend="${account.accountType.name() == 'CASH' ? 'fa-solid fa-wallet fs-5' : 'fa-solid fa-building-columns fs-5'}"></i>
                            </div>
                        </div>
                        
                        <div class="mt-4 pt-2 border-top border-light">
                            <span class="text-muted fs-8 text-uppercase fw-semibold d-block mb-1">Available Balance</span>
                            <h3 class="fw-extrabold text-dark mb-0 fs-2" 
                                th:classappend="${account.balance.doubleValue() < 0 ? 'text-danger' : ''}"
                                th:text="'₹' + ${#numbers.formatDecimal(account.balance, 1, 'COMMA', 2, 'POINT')}">₹0.00</h3>
                        </div>
                    </div>
                    
                    <div class="card-footer bg-light border-0 py-3 px-4 d-flex justify-content-between align-items-center">
                        <a th:href="@{/transactions(accountId=${account.id})}" class="btn btn-link p-0 text-decoration-none text-primary fs-7 fw-bold">
                            <i class="fa-solid fa-receipt me-1"></i> Transactions
                        </a>
                        <a th:href="@{/transactions/export(accountId=${account.id})}" class="btn btn-link p-0 text-decoration-none text-secondary fs-7 fw-semibold">
                            <i class="fa-solid fa-download me-1"></i> Export CSV
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals Fragment -->
    <div layout:fragment="modals">
        <!-- Add Account Modal -->
        <div class="modal fade" id="addAccountModal" tabindex="-1" aria-labelledby="addAccountModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 rounded-4 shadow-lg">
                    <div class="modal-header border-0 bg-primary text-white p-4 rounded-top-4">
                        <h5 class="modal-title fw-bold" id="addAccountModalLabel"><i class="fa-solid fa-building-columns me-2"></i> Add Bank Account</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/accounts}" th:object="${newAccount}" method="post">
                        <div class="modal-body p-4">
                            <div class="mb-3">
                                <label for="name" class="form-label fw-semibold text-dark fs-7">Bank/Account Name</label>
                                <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="e.g. HDFC Bank, SBI Account" required>
                            </div>
                            <div class="mb-3">
                                <label for="accountNumber" class="form-label fw-semibold text-dark fs-7">Account Number</label>
                                <input type="text" class="form-control" id="accountNumber" th:field="*{accountNumber}" placeholder="e.g. 987654321012">
                            </div>
                            <div class="mb-3">
                                <label for="balance" class="form-label fw-semibold text-dark fs-7">Starting Balance (₹)</label>
                                <div class="input-group">
                                    <span class="input-group-text">₹</span>
                                    <input type="number" step="0.01" class="form-control" id="balance" th:field="*{balance}" placeholder="0.00" required>
                                </div>
                            </div>
                        </div>
                        <div class="modal-footer border-0 p-4 pt-0">
                            <button type="button" class="btn btn-light rounded-pill px-4" data-bs-toggle="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary rounded-pill px-4 shadow-sm"><i class="fa-solid fa-floppy-disk me-2"></i> Create Account</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
